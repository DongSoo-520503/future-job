<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>추천 결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --border: rgba(99,179,237,0.18);
      --accent: #63b3ed;
      --accent2: #7c3aed;
      --green: #34d399;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 10px 16px 24px;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(99,179,237,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 10% 90%, rgba(124,58,237,0.08) 0%, transparent 60%);
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
      padding-top: 4px;
    }

    .header-badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--green);
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* INFO GRID */
    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .info-item {}
    .info-label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    /* JOB HIGHLIGHT */
    .job-card {
      background: linear-gradient(135deg, rgba(99,179,237,0.12), rgba(124,58,237,0.1));
      border: 1px solid rgba(99,179,237,0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .job-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .job-tag {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      margin-bottom: 8px;
    }

    .job-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    /* SCORE BAR */
    .score-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .score-chip {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .score-chip-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 3px;
    }

    .score-chip-value {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .score-chip-value.green { color: var(--green); }

    /* SECTIONS */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 6px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    .section-text {
      font-size: 0.88rem;
      line-height: 1.75;
      color: #cbd5e1;
      word-break: keep-all;
    }

    /* PROCESS */
    .process-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 6px;
    }

    .process-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    .process-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .process-step:last-child { border-bottom: none; padding-bottom: 0; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #a78bfa;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-content {}
    .step-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }
    .step-text {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
      word-break: keep-all;
    }

    /* BUTTON */
    .back-btn {
      display: block;
      width: 100%;
      height: 52px;
      background: rgba(99,179,237,0.08);
      border: 1px solid rgba(99,179,237,0.25);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.3px;
      transition: background 0.2s;
      text-align: center;
      line-height: 52px;
      text-decoration: none;
    }

    .back-btn:active { background: rgba(99,179,237,0.14); }

    .empty-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>미래 직업 추천 결과</h1>
    </div>

    <div id="resultContent"></div>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem('jobResult'));
    const el = document.getElementById('resultContent');

    if (!data) {
      el.innerHTML = `<div class="empty-box"><p>표시할 결과가 없습니다.</p></div>`;
    } else {
      el.innerHTML = `
        <div class="info-card">
          <div class="info-item">
            <span class="info-label">성명</span>
            <span class="info-value">${data.name}</span>
          </div>
          <div class="info-item">
            <span class="info-label">국가</span>
            <span class="info-value">${data.country}</span>
          </div>
          <div class="info-item">
            <span class="info-label">취업 시기</span>
            <span class="info-value">${data.period}</span>
          </div>
          <div class="info-item">
            <span class="info-label">연봉 순위 (후보 ${data.candidateCount}개 중)</span>
            <span class="info-value">${data.salaryRank}위</span>
          </div>
        </div>

        <div class="job-card">
          <div class="job-tag">추천 직업</div>
          <div class="job-name">${data.job}</div>

        </div>

        <div class="section-card">
          <div class="section-title">직업해설</div>
          <p class="section-text">${data.description || ''}</p>
        </div>

        <div class="section-card">
          <div class="section-title">핵심 전문 지식</div>
          <p class="section-text">${data.knowledge || ''}</p>
        </div>

        <div class="section-card">
          <div class="section-title">추천 학과 / 전공</div>
          <p class="section-text">${data.major || ''}</p>
        </div>

        <div class="section-card">
          <div class="section-title">준비 기간</div>
          <p class="section-text">${data.prepPeriod || ''}</p>
        </div>

        <div class="process-card">
          <div class="process-title">추천 산출 과정</div>
          <div class="process-step">
            <div class="step-num">1</div>
            <div class="step-content">
              <div class="step-label">조건 필터링</div>
              <p class="step-text">국가, 시기, 학업 계획 데이터를 기반으로 1차 후보군 ${data.candidateCount}개를 추출하였습니다.</p>
            </div>
          </div>
          <div class="process-step">
            <div class="step-num">2</div>
            <div class="step-content">
              <div class="step-label">성향 점수화</div>
              <p class="step-text">RIASEC 적합도 ${data.riasecScore}와 Big5 적합도 ${data.big5Score}를 60:40 가중평균하여 최종 적합도 ${data.finalScore}를 산출하였습니다.</p>
            </div>
          </div>
          <div class="process-step">
            <div class="step-num">3</div>
            <div class="step-content">
              <div class="step-label">최종 선택</div>
              <p class="step-text">최종 적합도 상위 ${data.topCount}개 중, 연봉순위가 높은 최적의 직업 1종을 선정하였습니다.</p>
            </div>
          </div>
        </div>

        <a href="index.html" class="back-btn">← 다시 입력하기</a>
      `;
    }
  </script>
</body>
</html>
